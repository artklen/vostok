<div class="popup-wrapper">
    <div class="js-basket-cdek-courier-select-city">
        @ ~input_id = ~unique_input_id();
		<div class="popup-label-container">
			<label for="{input_id|h}">{"Укажите адрес"|t}</label>
        </div>
		
		<div>
			<foreach address>
				<label class="radio-button-container">
					<div class="radio-button-icon">
						<input type="radio" class="radio-button js-select-address-cdek" name="radio" value="{.id}" data-title="{.title}" data-post="{.post}" data-mdadata="{.dadata}" data-cdek="{.cdek_id}" <?php if (d()->basket->delivery_post_address == d()->this->title){print 'checked';}?>><span></span>
					</div>
					<div class="radio-button-description">{.title}</div>
				</label>
			</foreach>
		</div>
		
		<input
            type="text"
            name="address"
            value="{basket.delivery_cdek_courier_address|h}"
            id="{input_id|h}"
            data-dadata="{basket.delivery_post_address_dadata|h}"
			placeholder="Новый адрес"			
			class="js-input-address-save-disabled"
        />

        <button type="button" class="send-12 js-button-address-save-disabled" onclick="$.fancybox.close();" <?php if (d()->basket->delivery_cdek_courier_address == ""){ print "disabled";} ?>>{"Сохранить"|t}</button>
    </div>
</div>

<script>
    (function () {
        const container = $('.js-basket-cdek-courier-select-city');
        Basket.cdek_courier_select(
            $(':input[name="address"]', container),
            <?= json_encode($_ENV['DADATA_TOKEN']) ?>
        );
		$('.js-select-address-cdek').click(function(){
			$(".js-input-address-save-disabled").val($(this).data('title'));
			$('.js-button-address-save-disabled').removeAttr('disabled');
			Basket.set_delivery_cdek_courier_city({
                address: $(this).data('title'),
                index: $(this).data('post'),
                code: $(this).data('cdek'),
                dadata: $(this).data('mdadata')
            }, $(':input[name="address"]', container));
		});
    })();
</script>
