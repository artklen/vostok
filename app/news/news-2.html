<div class="wrap-1">
	<div class="container">
		<div class="row">
			<div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
				{{crumbs}}
			</div>
		</div>
	</div>
</div>
<div class="inside-2 inside-news-2">
	<h1>{{edit}}{seo.h1|h}</h1>
	<div class="date"><?=ml_userdate(substr(d()->this->dt_at, 0, 10))?></div>
</div>
<div class="news-3">
	<div class="container">
		<div class="row">
			@ if (~this->image_full) {
				<div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
					<img src="{.image_full}" alt=""/>
				</div>
			@ }
			<div class="col-xs-12 col-sm-12 col-md-12 col-lg-10 col-lg-offset-1">
				<div class="content">
					{.text_full}
				</div>	
			</div>
		</div>
	</div>
</div>
