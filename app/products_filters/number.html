@ if (!empty(~fields_data[~name])) {
<div class="item js-unfolding-container">
	@ if (iam()) {
		<div style="position: absolute; margin-left: -10px;">{{edit ~field}}</div>
	@ }
	<a href="javascript:void(0);" class="name js-unfolding-button"><span>{field.title|h}</span></a>
	<div class="item-ui-number js-unfolding-block">
		<div class="filter-list js-number-slider" data-slider-values="<?php
			$result = [];
			foreach (~fields_data[~name] as $key => $data) {
				$result[] = $data['value'];
			}
			sort($result, SORT_NUMERIC);
			print h(json_encode($result, JSON_UNESCAPED_UNICODE));
			?>" data-slider-value="<?= !empty(~get[~name]) && is_array(~get[~name]) ? reset(~get[~name]) : '' ?>" data-unit="{field.unit|h}">
			<div class="js-slider-bar"></div>
			<input type="hidden" name="{name|h}[]" class="js-number-input" value="" />
		</div>
	</div>
</div>	
@ }
