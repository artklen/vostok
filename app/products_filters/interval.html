@ if (isset(~fields_data[~name], ~fields_data[~name]['max'], ~fields_data[~name]['min']) && ~fields_data[~name]['max'] - ~fields_data[~name]['min'] > 1e-7) {
<div class="item js-unfolding-container">
	<a href="javascript:void(0);" class="name js-unfolding-button">{field.title|h}</a>
	<div class="js-unfolding-block" style="margin-left: 10px; margin-right: 8px">
		<label class="col-1">
			<input
				id="num-1"
				type="text"
				name="{name|h}[min]"
				class="left js-slider-input-min"
				value="<?= h(isset(~get[~name], ~get[~name]['min']) ? ~get[~name]['min'] : ~fields_data[~name]['min']) ?>"
				data-value-limit="<?= h(~fields_data[~name]['min']) ?>"
			>
		</label>
		<label class="col-2 right">
			<input
				id="num-2"
				type="text"
				name="{name|h}[max]"
				class="right js-slider-input-max"
				value="<?= h(isset(~get[~name], ~get[~name]['max']) ? ~get[~name]['max'] : ~fields_data[~name]['max']) ?>"
				data-value-limit="<?= h(~fields_data[~name]['max']) ?>"
			>
		</label>
		<div class="clear"></div>
		<div class="js-slider-bar"></div>
		<div id="js-interval-slider"></div>
	</div>	
</div>
@ }
