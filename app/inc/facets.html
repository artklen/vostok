<div class="facets-1 js-facets-1">
	<form action="/catalog" method="get" class="jasdas-filter-form">
		@ foreach (~products__fields as ~field) {
			@ if (!empty(~fields_data[~field['field_name']]) || ~field['field_name'] === 'all_links') {
				{{render_field ~field['field_name'], ~field, '/products_filters/'}}
			@ }
		@ }

		<button type="submit" class="send-8">Показать</button>
		<a href="/catalog" class="send-9">Сбросить фильтр</a>
	</form>
</div>
