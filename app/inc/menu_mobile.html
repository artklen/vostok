<ul class="menu-3 hidden-lg">
    <li>
        <form method="get" action="{langlink}/catalog">
            <div class="search small">
                <input class="search-input" name="search" type="text" placeholder="{"Поиск по каталогу"|t}"/>
                <button type="submit"></button>
            </div>
        </form>
    </li>
    <li>
        <div class="city-mobile-block">
            <a href="{langlink}/cities/select?url=%2F" class="city-selection js-feedback">{current_city.title|h}</a>
        </div>
    </li>

    <?php
    foreach (d()->catalog_menu as $item) {
        $showSubmenu = ! empty($item->submenu);
        ?>
        <li class="<?= $showSubmenu ? 'js-unfolding-container-menu' : '' ?>">
            <a
                href="{langlink}<?= h($item->link) ?>"
                class="<?= $showSubmenu ? 'arrow js-unfolding-button-menu' : '' ?>"
            ><?= h($item->title) ?></a>

            <?php
            if ($showSubmenu) { ?>
                <ul class="last-1 js-unfolding-block-menu">
                    <?php
                    foreach ($item->submenu as $i => $subitem) { ?>
                        <li>
                            <a href="{langlink}<?= h($subitem->link) ?>">
                                <span class="sub-1"></span>
                                <span class="sub-2">
                                    <?= h($subitem->title) ?>
                                    <?php
                                    if (isset($subitem->number)) { ?>
                                        <span class="sub-3"><?= h($subitem->number) ?></span>
                                        <?php
                                    }
                                    ?>
                                </span>
                            </a>
                        </li>
                        <?php
                    } ?>
                </ul>
                <?php
            } ?>
        </li>
        <?php
    } ?>
</ul>
